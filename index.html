<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Dual Hand Tracker</title>
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: #05060f;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            color: #00fff7;
        }

        /* ── Background ── */
        .bg-gradient {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: radial-gradient(ellipse at 50% 50%, #0d0a2e 0%, #05060f 70%);
        }

        .bg-gradient::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 25% 30%, rgba(96, 0, 255, .08) 0%, transparent 50%),
                radial-gradient(circle at 75% 70%, rgba(0, 255, 247, .06) 0%, transparent 50%);
            animation: bgPulse 8s ease-in-out infinite alternate;
        }

        @keyframes bgPulse {
            0% {
                opacity: .6;
                transform: scale(1)
            }

            100% {
                opacity: 1;
                transform: scale(1.1)
            }
        }

        canvas#stars {
            position: fixed;
            inset: 0;
            z-index: 1
        }

        .scanline {
            position: fixed;
            inset: 0;
            z-index: 10;
            pointer-events: none;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 255, 247, .012) 2px, rgba(0, 255, 247, .012) 4px);
        }

        #webcam {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 200px;
            height: 150px;
            z-index: 20;
            border: 1px solid rgba(0, 255, 247, .3);
            border-radius: 8px;
            object-fit: cover;
            transform: scaleX(-1);
            opacity: 0.7;
            box-shadow: 0 0 20px rgba(0, 255, 247, .15);
        }

        #handCanvas {
            position: fixed;
            inset: 0;
            z-index: 5
        }

        .status {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 20;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .status-row {
            display: flex;
            align-items: center;
            gap: 4px
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 8px;
            animation: dotPulse 1.5s ease-in-out infinite;
        }

        .status-dot.active {
            background: #00ff88;
            box-shadow: 0 0 8px #00ff88
        }

        .status-dot.loading {
            background: #ffa500;
            box-shadow: 0 0 8px #ffa500
        }

        .status-dot.error {
            background: #ff4455;
            box-shadow: 0 0 8px #ff4455
        }

        @keyframes dotPulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: .4
            }
        }

        .hand-count {
            position: fixed;
            top: 46px;
            left: 20px;
            z-index: 20;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(168, 85, 247, .6);
        }

        .title {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            font-size: 13px;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: rgba(0, 255, 247, .35);
            animation: titlePulse 4s ease-in-out infinite alternate;
        }

        @keyframes titlePulse {
            0% {
                opacity: .3;
                letter-spacing: 6px
            }

            100% {
                opacity: .6;
                letter-spacing: 8px
            }
        }

        .instructions {
            position: fixed;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(168, 85, 247, .4);
            white-space: nowrap;
        }
    </style>
</head>

<body>

    <div class="bg-gradient"></div>
    <canvas id="stars"></canvas>
    <div class="scanline"></div>

    <video id="webcam" autoplay playsinline></video>
    <canvas id="handCanvas"></canvas>

    <div class="status">
        <div class="status-row"><span class="status-dot loading" id="statusDot"></span><span
                id="statusText">INITIALIZING...</span></div>
    </div>
    <div class="hand-count" id="handCount"></div>

    <div class="instructions">SHOW BOTH HANDS TO THE CAMERA</div>
    <div class="title">NEURAL INTERFACE v3.0 — DUAL</div>

    <!-- MediaPipe Hands via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.min.js"></script>

    <script>
        // ═══════════════════════════════════════
        //  CONFIG — TWO COLOR PALETTES
        // ═══════════════════════════════════════
        const PALETTE_LEFT = {
            fingers: ['#a855f7', '#00fff7', '#0080ff', '#a855f7', '#00fff7'],
            palm: '#00fff7',
            accent: '#a855f7',
            label: 'LEFT',
        };
        const PALETTE_RIGHT = {
            fingers: ['#ff55aa', '#ff8800', '#ffdd00', '#ff55aa', '#ff8800'],
            palm: '#ff8800',
            accent: '#ff55aa',
            label: 'RIGHT',
        };

        function getPalette(handedness) {
            // MediaPipe returns "Left"/"Right" from camera POV; we mirror, so swap
            return handedness === 'Left' ? PALETTE_RIGHT : PALETTE_LEFT;
        }

        const CONNECTIONS = [
            [0, 1], [1, 2], [2, 3], [3, 4],
            [0, 5], [5, 6], [6, 7], [7, 8],
            [0, 9], [9, 10], [10, 11], [11, 12],
            [0, 13], [13, 14], [14, 15], [15, 16],
            [0, 17], [17, 18], [18, 19], [19, 20],
            [5, 9], [9, 13], [13, 17], [0, 17], [0, 5],
        ];

        const FINGER_CHAINS = [
            [0, 1, 2, 3, 4], [0, 5, 6, 7, 8], [0, 9, 10, 11, 12],
            [0, 13, 14, 15, 16], [0, 17, 18, 19, 20],
        ];

        function getFingerIndex(a, b) {
            if ([a, b].some(p => p >= 1 && p <= 4)) return 0;
            if ([a, b].some(p => p >= 5 && p <= 8)) return 1;
            if ([a, b].some(p => p >= 9 && p <= 12)) return 2;
            if ([a, b].some(p => p >= 13 && p <= 16)) return 3;
            if ([a, b].some(p => p >= 17 && p <= 20)) return 4;
            return 1;
        }

        // ═══════════════════════════════════════
        //  STARFIELD
        // ═══════════════════════════════════════
        (function () {
            const c = document.getElementById('stars');
            const x = c.getContext('2d');
            let W, H, stars = [];
            function resize() { W = c.width = innerWidth; H = c.height = innerHeight }
            resize(); window.addEventListener('resize', resize);
            for (let i = 0; i < 200; i++) {
                stars.push({ x: Math.random() * 2000 - 200, y: Math.random() * 1400 - 200, r: Math.random() * 1.2 + 0.2, a: Math.random() * 0.5 + 0.1, s: Math.random() * 0.02 + 0.005, p: Math.random() * Math.PI * 2 });
            }
            let t = 0;
            (function draw() {
                x.clearRect(0, 0, W, H); t += 0.016;
                for (const s of stars) { const f = 0.5 + 0.5 * Math.sin(t * s.s * 60 + s.p); x.beginPath(); x.arc(s.x, s.y, s.r, 0, Math.PI * 2); x.fillStyle = `rgba(180,210,255,${s.a * f})`; x.fill(); }
                requestAnimationFrame(draw);
            })();
        })();

        // ═══════════════════════════════════════
        //  HAND STATE (per-hand)
        // ═══════════════════════════════════════
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('handCanvas');
        const ctx = canvas.getContext('2d');
        const dotEl = document.getElementById('statusDot');
        const textEl = document.getElementById('statusText');
        const countEl = document.getElementById('handCount');

        let W, H;
        function resizeCanvas() { W = canvas.width = innerWidth; H = canvas.height = innerHeight }
        resizeCanvas(); window.addEventListener('resize', resizeCanvas);

        const SMOOTH = 0.35;
        function lerp(a, b, t) { return a + (b - a) * t }

        // Per-hand state keyed by "Left"/"Right"
        const handState = {};
        function getHandState(label) {
            if (!handState[label]) {
                handState[label] = {
                    prev: null,
                    trails: [],
                    maxTrail: 8,
                };
            }
            return handState[label];
        }

        function smoothHand(label, curr) {
            const st = getHandState(label);
            if (!st.prev) { st.prev = curr; return curr; }
            const out = curr.map((p, i) => ({
                x: lerp(st.prev[i].x, p.x, SMOOTH),
                y: lerp(st.prev[i].y, p.y, SMOOTH),
                z: lerp(st.prev[i].z || 0, p.z || 0, SMOOTH),
            }));
            st.prev = out;
            return out;
        }

        // Shared particles
        const particles = [];
        function spawnParticles(lm, palette) {
            const tips = [4, 8, 12, 16, 20];
            for (const ti of tips) {
                if (Math.random() > 0.25) continue;
                const p = lm[ti];
                const fi = Math.floor((ti - 1) / 4);
                particles.push({
                    x: p.x * W, y: p.y * H,
                    vx: (Math.random() - 0.5) * 2.5,
                    vy: -Math.random() * 2.5 - 0.5,
                    life: 1, decay: 0.012 + Math.random() * 0.01,
                    r: 1.5 + Math.random() * 2,
                    color: palette.fingers[fi],
                });
            }
        }
        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i]; p.x += p.vx; p.y += p.vy; p.life -= p.decay;
                if (p.life <= 0) particles.splice(i, 1);
            }
        }
        function drawParticles() {
            for (const p of particles) {
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
                ctx.fillStyle = p.color; ctx.globalAlpha = p.life * 0.7;
                ctx.shadowColor = p.color; ctx.shadowBlur = 12; ctx.fill();
            }
            ctx.globalAlpha = 1; ctx.shadowBlur = 0;
        }

        // ═══════════════════════════════════════
        //  DRAW SINGLE NEON HAND
        // ═══════════════════════════════════════
        let animTime = 0;

        function drawSingleHand(landmarks, label, palette) {
            const st = getHandState(label);
            const lm = smoothHand(label, landmarks);

            // Store trail
            st.trails.push(lm.map(p => ({ x: p.x, y: p.y })));
            if (st.trails.length > st.maxTrail) st.trails.shift();

            // ── Trails ──
            for (let t = 0; t < st.trails.length - 1; t++) {
                const alpha = (t / st.trails.length) * 0.06;
                const tr = st.trails[t];
                for (const [a, b] of CONNECTIONS) {
                    const fi = getFingerIndex(a, b);
                    ctx.beginPath();
                    ctx.moveTo(tr[a].x * W, tr[a].y * H);
                    ctx.lineTo(tr[b].x * W, tr[b].y * H);
                    ctx.strokeStyle = palette.fingers[fi];
                    ctx.globalAlpha = alpha; ctx.lineWidth = 1; ctx.stroke();
                }
            }
            ctx.globalAlpha = 1;

            // ── Outer glow ──
            ctx.save(); ctx.shadowBlur = 30;
            for (const [a, b] of CONNECTIONS) {
                const fi = getFingerIndex(a, b);
                ctx.beginPath();
                ctx.moveTo(lm[a].x * W, lm[a].y * H);
                ctx.lineTo(lm[b].x * W, lm[b].y * H);
                ctx.strokeStyle = palette.fingers[fi];
                ctx.shadowColor = palette.fingers[fi];
                ctx.lineWidth = 6; ctx.globalAlpha = 0.12; ctx.stroke();
            }
            ctx.restore(); ctx.globalAlpha = 1;

            // ── Main skeleton ──
            ctx.save(); ctx.shadowBlur = 12; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            for (const [a, b] of CONNECTIONS) {
                const fi = getFingerIndex(a, b);
                const ax = lm[a].x * W, ay = lm[a].y * H, bx = lm[b].x * W, by = lm[b].y * H;
                const grad = ctx.createLinearGradient(ax, ay, bx, by);
                grad.addColorStop(0, palette.fingers[fi]);
                grad.addColorStop(1, palette.fingers[(fi + 1) % 5]);
                ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(bx, by);
                ctx.strokeStyle = grad; ctx.shadowColor = palette.fingers[fi];
                ctx.lineWidth = 2.5; ctx.globalAlpha = 0.9; ctx.stroke();
            }
            ctx.restore(); ctx.globalAlpha = 1;

            // ── Energy flow dashes ──
            ctx.save();
            const dashOff = animTime * 60;
            ctx.setLineDash([4, 12]); ctx.lineDashOffset = -dashOff; ctx.lineWidth = 1;
            for (let fi = 0; fi < FINGER_CHAINS.length; fi++) {
                const ch = FINGER_CHAINS[fi];
                ctx.beginPath(); ctx.moveTo(lm[ch[0]].x * W, lm[ch[0]].y * H);
                for (let j = 1; j < ch.length; j++) ctx.lineTo(lm[ch[j]].x * W, lm[ch[j]].y * H);
                ctx.strokeStyle = palette.fingers[fi];
                ctx.globalAlpha = 0.35; ctx.shadowColor = palette.fingers[fi];
                ctx.shadowBlur = 6; ctx.stroke();
            }
            ctx.setLineDash([]); ctx.restore(); ctx.globalAlpha = 1;

            // ── Palm fill ──
            const palm = [0, 5, 9, 13, 17];
            ctx.save(); ctx.globalAlpha = 0.05;
            ctx.fillStyle = palette.palm; ctx.shadowColor = palette.palm; ctx.shadowBlur = 20;
            ctx.beginPath(); ctx.moveTo(lm[palm[0]].x * W, lm[palm[0]].y * H);
            for (let i = 1; i < palm.length; i++) ctx.lineTo(lm[palm[i]].x * W, lm[palm[i]].y * H);
            ctx.closePath(); ctx.fill();
            ctx.restore(); ctx.globalAlpha = 1;

            // ── Joint nodes ──
            for (let i = 0; i < 21; i++) {
                const x = lm[i].x * W, y = lm[i].y * H;
                const isTip = [4, 8, 12, 16, 20].includes(i);
                const isBase = [0, 5, 9, 13, 17].includes(i);
                const fi = i === 0 ? 1 : Math.floor((i - 1) / 4);
                const color = palette.fingers[fi];
                const pulse = Math.sin(animTime * 3 + i * 0.5) * 0.5 + 0.5;

                if (isTip) {
                    const r = 5 + pulse * 3;
                    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2);
                    ctx.fillStyle = color; ctx.globalAlpha = 0.15 + pulse * 0.15;
                    ctx.shadowColor = color; ctx.shadowBlur = 25; ctx.fill();
                    ctx.beginPath(); ctx.arc(x, y, 3, 0, Math.PI * 2);
                    ctx.fillStyle = '#fff'; ctx.globalAlpha = 0.8 + pulse * 0.2;
                    ctx.shadowBlur = 10; ctx.fill();
                } else if (isBase) {
                    ctx.beginPath(); ctx.arc(x, y, 3.5 + pulse * 1.5, 0, Math.PI * 2);
                    ctx.fillStyle = color; ctx.globalAlpha = 0.6;
                    ctx.shadowColor = color; ctx.shadowBlur = 15; ctx.fill();
                } else {
                    ctx.beginPath(); ctx.arc(x, y, 2 + pulse, 0, Math.PI * 2);
                    ctx.fillStyle = color; ctx.globalAlpha = 0.5;
                    ctx.shadowColor = color; ctx.shadowBlur = 8; ctx.fill();
                }
            }
            ctx.globalAlpha = 1; ctx.shadowBlur = 0;

            // ── Geometric accent ──
            const cx = (lm[0].x + lm[5].x + lm[9].x + lm[13].x + lm[17].x) / 5 * W;
            const cy = (lm[0].y + lm[5].y + lm[9].y + lm[13].y + lm[17].y) / 5 * H;
            const ps = Math.hypot((lm[5].x - lm[17].x) * W, (lm[5].y - lm[17].y) * H);

            ctx.save(); ctx.translate(cx, cy); ctx.rotate(animTime * 0.3);
            ctx.beginPath();
            for (let i = 0; i < 6; i++) {
                const ang = (Math.PI * 2 / 6) * i, r = ps * 0.6;
                const px = Math.cos(ang) * r, py = Math.sin(ang) * r;
                i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
            }
            ctx.closePath();
            ctx.strokeStyle = palette.accent;
            ctx.globalAlpha = 0.1 + Math.sin(animTime) * 0.05;
            ctx.lineWidth = 0.8; ctx.shadowColor = palette.accent; ctx.shadowBlur = 10; ctx.stroke();
            ctx.beginPath(); ctx.arc(0, 0, ps * 0.35, 0, Math.PI * 2);
            ctx.strokeStyle = palette.palm; ctx.globalAlpha = 0.08;
            ctx.lineWidth = 0.6; ctx.setLineDash([3, 8]); ctx.stroke(); ctx.setLineDash([]);
            ctx.restore(); ctx.globalAlpha = 1; ctx.shadowBlur = 0;

            spawnParticles(lm, palette);

            return lm; // return smoothed for energy beam
        }

        // ═══════════════════════════════════════
        //  ENERGY BEAM BETWEEN TWO HANDS
        // ═══════════════════════════════════════
        function drawEnergyBeams(lmA, lmB, palA, palB) {
            const tips = [4, 8, 12, 16, 20];

            for (const ti of tips) {
                const ax = lmA[ti].x * W, ay = lmA[ti].y * H;
                const bx = lmB[ti].x * W, by = lmB[ti].y * H;
                const dist = Math.hypot(ax - bx, ay - by);

                if (dist > 500) continue; // too far

                const intensity = Math.max(0, 1 - dist / 500);
                const fi = Math.floor((ti - 1) / 4);

                // Beam
                const grad = ctx.createLinearGradient(ax, ay, bx, by);
                grad.addColorStop(0, palA.fingers[fi]);
                grad.addColorStop(0.5, '#ffffff');
                grad.addColorStop(1, palB.fingers[fi]);

                ctx.save();
                ctx.beginPath(); ctx.moveTo(ax, ay);

                // Wavy beam using quadratic curves
                const mx = (ax + bx) / 2, my = (ay + by) / 2;
                const wave = Math.sin(animTime * 5) * 15 * intensity;
                const nx = -(by - ay) / dist, ny = (bx - ax) / dist; // perpendicular
                ctx.quadraticCurveTo(mx + nx * wave, my + ny * wave, bx, by);

                ctx.strokeStyle = grad;
                ctx.lineWidth = 1.5 + intensity * 2;
                ctx.globalAlpha = intensity * 0.6;
                ctx.shadowColor = '#ffffff';
                ctx.shadowBlur = 20 + intensity * 20;
                ctx.stroke();

                // Outer glow beam
                ctx.beginPath(); ctx.moveTo(ax, ay);
                ctx.quadraticCurveTo(mx + nx * wave, my + ny * wave, bx, by);
                ctx.lineWidth = 4 + intensity * 4;
                ctx.globalAlpha = intensity * 0.1;
                ctx.stroke();

                ctx.restore();

                // Spark at midpoint
                if (intensity > 0.3 && Math.random() > 0.6) {
                    const sx = mx + nx * wave + (Math.random() - 0.5) * 20;
                    const sy = my + ny * wave + (Math.random() - 0.5) * 20;
                    particles.push({
                        x: sx, y: sy,
                        vx: (Math.random() - 0.5) * 4,
                        vy: (Math.random() - 0.5) * 4,
                        life: 1, decay: 0.04 + Math.random() * 0.03,
                        r: 1 + Math.random() * 2,
                        color: '#ffffff',
                    });
                }
            }
            ctx.globalAlpha = 1; ctx.shadowBlur = 0;
        }

        // ═══════════════════════════════════════
        //  MAIN RENDER LOOP
        // ═══════════════════════════════════════
        let currentHands = []; // [{landmarks, label, palette}]
        let handDetected = false;
        let lastDetectionTime = 0;

        function renderFrame() {
            animTime += 0.016;
            ctx.clearRect(0, 0, W, H);

            const smoothed = [];

            for (const h of currentHands) {
                const lm = drawSingleHand(h.landmarks, h.label, h.palette);
                smoothed.push({ lm, palette: h.palette });
            }

            // Energy beams between hands
            if (smoothed.length === 2) {
                drawEnergyBeams(smoothed[0].lm, smoothed[1].lm, smoothed[0].palette, smoothed[1].palette);
            }

            updateParticles();
            drawParticles();
        }

        // ═══════════════════════════════════════
        //  IDLE (fallback when no hands detected)
        // ═══════════════════════════════════════
        function generateIdleHand(t, offsetX) {
            const base = [
                { x: 0.50, y: 0.70 }, { x: 0.42, y: 0.62 }, { x: 0.35, y: 0.55 }, { x: 0.30, y: 0.48 }, { x: 0.26, y: 0.42 },
                { x: 0.40, y: 0.48 }, { x: 0.39, y: 0.38 }, { x: 0.38, y: 0.30 }, { x: 0.37, y: 0.22 },
                { x: 0.48, y: 0.46 }, { x: 0.48, y: 0.35 }, { x: 0.48, y: 0.26 }, { x: 0.48, y: 0.18 },
                { x: 0.56, y: 0.47 }, { x: 0.57, y: 0.37 }, { x: 0.58, y: 0.29 }, { x: 0.58, y: 0.22 },
                { x: 0.62, y: 0.50 }, { x: 0.64, y: 0.42 }, { x: 0.65, y: 0.37 }, { x: 0.66, y: 0.32 },
            ];
            const drift = Math.sin(t * 0.5) * 0.03;
            const driftY = Math.cos(t * 0.35) * 0.02;
            return base.map((p, i) => {
                const wave = Math.sin(t * 1.5 + i * 0.4) * 0.008;
                const wave2 = Math.cos(t * 1.2 + i * 0.3) * 0.005;
                return { x: p.x + drift + wave + offsetX, y: p.y + driftY + wave2, z: 0 };
            });
        }

        // ═══════════════════════════════════════
        //  MEDIAPIPE SETUP — 2 HANDS
        // ═══════════════════════════════════════
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/${file}`,
        });

        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.5,
        });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                handDetected = true;
                lastDetectionTime = performance.now();

                currentHands = results.multiHandLandmarks.map((lm, idx) => {
                    const label = results.multiHandedness[idx]?.label || (idx === 0 ? 'Left' : 'Right');
                    const mirrored = lm.map(p => ({ x: 1 - p.x, y: p.y, z: p.z || 0 }));
                    return {
                        landmarks: mirrored,
                        label: label,
                        palette: getPalette(label),
                    };
                });

                countEl.textContent = `HANDS DETECTED: ${currentHands.length}`;
                renderFrame();
            } else {
                handDetected = false;
                countEl.textContent = 'HANDS DETECTED: 0';
            }
        });

        // ═══════════════════════════════════════
        //  STATUS + CAMERA
        // ═══════════════════════════════════════
        function setStatus(state, text) {
            dotEl.className = 'status-dot ' + state;
            textEl.textContent = text;
        }

        async function startCamera() {
            try {
                setStatus('loading', 'ACCESSING CAMERA...');
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { width: 640, height: 480, facingMode: 'user' }
                });
                video.srcObject = stream;
                await video.play();

                setStatus('loading', 'LOADING HAND MODEL...');

                const cam = new Camera(video, {
                    onFrame: async () => { await hands.send({ image: video }); },
                    width: 640, height: 480,
                });
                await cam.start();

                setStatus('active', 'DUAL TRACKING ACTIVE');
            } catch (err) {
                console.error('Camera error:', err);
                setStatus('error', 'CAMERA DENIED — SHOWING DEMO');
                startIdleMode();
            }
        }

        // ── IDLE MODE ──
        let idleRunning = false;
        function startIdleMode() {
            if (idleRunning) return; idleRunning = true;
            let t = 0;
            (function loop() {
                t += 0.016;
                if (!handDetected) {
                    currentHands = [
                        { landmarks: generateIdleHand(t, -0.15), label: 'Right', palette: PALETTE_LEFT },
                        { landmarks: generateIdleHand(t + 1.5, 0.15), label: 'Left', palette: PALETTE_RIGHT },
                    ];
                    renderFrame();
                }
                requestAnimationFrame(loop);
            })();
        }

        let idleCheckStarted = false;
        function startIdleCheck() {
            if (idleCheckStarted) return; idleCheckStarted = true;
            let t = 0;
            (function check() {
                t += 0.016;
                if (!handDetected && performance.now() - lastDetectionTime > 2000) {
                    currentHands = [
                        { landmarks: generateIdleHand(t, -0.15), label: 'Right', palette: PALETTE_LEFT },
                        { landmarks: generateIdleHand(t + 1.5, 0.15), label: 'Left', palette: PALETTE_RIGHT },
                    ];
                    renderFrame();
                }
                requestAnimationFrame(check);
            })();
        }

        // ── INIT ──
        startCamera().then(() => { startIdleCheck(); });
    </script>
</body>

</html>
